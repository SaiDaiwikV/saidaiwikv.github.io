    <circle cx="40" cy="274" r="4" fill="#F87171"/>
    <text x="52" y="278" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#c9cffb">intrusion detected</text>
  </g>
  <text x="24" y="42" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#CBACF9" font-weight="700">NIDS</text>
