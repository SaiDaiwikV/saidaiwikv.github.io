    <line x1="210" y1="150" x2="350" y2="80"/>
    <line x1="210" y1="150" x2="360" y2="210"/>
    <line x1="210" y1="150" x2="150" y2="250"/>
    <line x1="210" y1="150" x2="300" y2="250"/>
    <line x1="70" y1="70" x2="150" y2="40"/>
    <line x1="350" y1="80" x2="360" y2="210"/>
  </g>

  <g fill="#34D399">
    <circle cx="140" cy="110" r="2.6"/>
    <circle cx="285" cy="115" r="2.6"/>
    <circle cx="255" cy="205" r="2.6"/>
  </g>

  <g>
    <circle cx="70" cy="70" r="7" fill="#0d1030" stroke="url(#pg)" stroke-width="2"/>
    <circle cx="60" cy="200" r="7" fill="#0d1030" stroke="url(#pg)" stroke-width="2"/>
    <circle cx="150" cy="40" r="5.5" fill="#0d1030" stroke="#A78BFA" stroke-width="1.8"/>
    <circle cx="150" cy="250" r="6.5" fill="#0d1030" stroke="url(#pg)" stroke-width="2"/>
    <circle cx="300" cy="250" r="6.5" fill="#0d1030" stroke="url(#pg)" stroke-width="2"/>
    <circle cx="350" cy="80" r="8" fill="#2a0f1a" stroke="#F87171" stroke-width="2.2" filter="url(#glow)"/>
    <circle cx="360" cy="210" r="7" fill="#2a0f1a" stroke="#FBBF24" stroke-width="2"/>
  </g>

  <g stroke="#8B5CF6" fill="none" opacity="0.25">
    <circle cx="210" cy="150" r="54"/>
    <circle cx="210" cy="150" r="74" opacity="0.6"/>
