    <path d="M193 154 L205 166 L229 138" stroke="#34D399" stroke-width="4" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#glow)">
    <path d="M378 34 L398 74 H358 Z" fill="#F87171"/>
    <rect x="386.5" y="46" width="3" height="14" rx="1.5" fill="#1a0b12"/>
    <circle cx="388" cy="66" r="2" fill="#1a0b12"/>
  </g>

  <line x1="24" y1="150" x2="396" y2="150" stroke="#60A5FA" stroke-width="1" opacity="0.15"/>

  <g>
