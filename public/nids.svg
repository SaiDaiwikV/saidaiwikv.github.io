<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="420" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0d20"/><stop offset="1" stop-color="#151934"/>
    </linearGradient>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E2CBFF"/><stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="rad" cx="0.5" cy="0.5" r="0.55">
      <stop stop-color="#7C3AED" stop-opacity="0.40"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#8ea0ff" opacity="0.06"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="420" height="300" fill="url(#bg)"/>
  <rect width="420" height="300" fill="url(#dots)"/>
  <ellipse cx="210" cy="150" rx="170" ry="130" fill="url(#rad)"/>

  <g stroke="#A78BFA" stroke-width="1.3" opacity="0.45">
